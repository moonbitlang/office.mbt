name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  MOON_WARN_LIST: "+a-31-32-38-39"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Format (${{ matrix.moonbit-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        moonbit-version:
          - latest
          - nightly
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up MoonBit
        env:
          MOONBIT_INSTALL_VERSION: ${{ matrix.moonbit-version }}
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Update MoonBit dependencies
        run: |
          moon version --all
          moon update

      - name: Check formatting
        run: moon fmt --check

  native:
    name: Native Test (${{ matrix.moonbit-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        moonbit-version:
          - latest
          - nightly
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up MoonBit
        env:
          MOONBIT_INSTALL_VERSION: ${{ matrix.moonbit-version }}
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Update MoonBit dependencies
        run: |
          moon version --all
          moon update

      - name: Set up DotSlash
        uses: facebook/install-dotslash@latest

      - name: Set up Scrut
        env:
          SCRUT_VERSION: v0.4.3
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            "https://github.com/facebookincubator/scrut/releases/download/${SCRUT_VERSION}/scrut" \
            > scrut
          chmod +x scrut
          echo "SCRUT_BIN=$PWD/scrut" >> "$GITHUB_ENV"

      - name: Check native target
        run: moon check --target native --warn-list "$MOON_WARN_LIST"

      - name: Test native target
        run: moon test --target native

      - name: Test native CLI documentation
        run: moon run --target native scripts/check_scrut_cli.mbtx

  backend-check:
    name: Backend Check (${{ matrix.moonbit-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        moonbit-version:
          - latest
          - nightly
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up MoonBit
        env:
          MOONBIT_INSTALL_VERSION: ${{ matrix.moonbit-version }}
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Update MoonBit dependencies
        run: |
          moon version --all
          moon update

      - name: Check all supported targets
        run: moon check --target all --warn-list "$MOON_WARN_LIST"
