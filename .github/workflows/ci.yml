name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: check + test (mbtexcel + docx2html + pdflite, nightly)
    runs-on: ubuntu-latest
    # The Build (native) step compiles one very large generated C file
    # (pdflite's markdown CLI); cap the job so a pathological compile fails
    # loudly instead of hanging for the 6h default.
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # This repo is a `moon work` workspace with three members: `.`
      # (bobzhang/mbtexcel), `./docx2html` (bobzhang/docx2html), and `./pdflite`
      # (bobzhang/pdflite) — the latter two vendored with full history. Root
      # `moon check`/`moon test`/`moon fmt` operate on ALL members, so most
      # steps below cover the three modules at once. (pdflite has native C
      # stubs; the ubuntu runner's `cc` compiles them for the native target.)
      #
      # A handful of mbtexcel parity/fixture tests read the vendored Go excelize
      # checkout (gitignored locally) from `excelize/` and `.repos/excelize/`.
      # Provision it so the full suite can run in CI. (docx2html's own fixtures
      # are committed under docx2html/tests/, so they need no extra setup.)
      - name: Fetch excelize test fixtures
        run: |
          git clone --depth 1 https://github.com/qax-os/excelize.git .repos/excelize
          ln -s .repos/excelize excelize

      # mbtexcel's `*_openxml_validity_test.mbt` tests shell out to the Microsoft
      # DocumentFormat.OpenXml SDK validator via scripts/validate_xlsx.sh, which
      # uses the system `dotnet` when it has the net8 runtime. Making .NET 8
      # available here means `moon test` runs real schema validation of
      # generated workbooks in CI. (docx2html does not use the SDK validator.)
      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # The nightly toolchain is required: mbtexcel depends on
      # moonbitlang/async >= 0.20 (wasm filesystem support) and its xlsx CLI
      # targets the wasm backend, both of which need nightly. `moon work sync`
      # has aligned both members on async@0.20.1 + x@0.4.43.
      - name: Set up MoonBit (nightly)
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash -s nightly
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: MoonBit versions
        run: moon version --all

      # Populate the module registry so dependency resolution works on a fresh
      # runner (moonbitlang/async, moonbitlang/x, peter-jerry-ye/codex for
      # mbtexcel; hustcer/fzip for docx2html).
      - name: Resolve dependencies
        run: moon update

      # Format check across the whole workspace.
      - name: Format check
        run: |
          moon fmt
          if ! git diff --quiet; then
            echo "::error::moon fmt changed files; run moon fmt and commit the result."
            git --no-pager diff --stat
            exit 1
          fi

      # Regenerate every member's `pkg.generated.mbti` and fail if the committed
      # interfaces drift from the source (all three members commit their .mbti).
      # Run `moon info` and commit the result to fix.
      - name: Interface check
        run: |
          moon info
          if ! git diff --quiet -- '*pkg.generated.mbti'; then
            echo "::error::pkg.generated.mbti out of date; run moon info and commit."
            git --no-pager diff --stat -- '*pkg.generated.mbti'
            exit 1
          fi

      # Type check both members (native).
      - name: Type check
        run: moon check

      # Type check both members for the wasm backend. mbtexcel's library + xlsx
      # CLI target wasm; docx2html's library packages also build for wasm (its
      # native-only CLI is skipped for this target).
      - name: Type check (wasm)
        run: moon check --target wasm

      # Run all members' native test suites in one pass. Covers mbtexcel
      # (including OpenXML SDK schema validation via .NET), docx2html
      # (converter/reader/fixtures/stress), and pdflite (reader/writer/
      # fixture-acceptance, incl. native C-stub code paths).
      - name: Test (native)
        run: moon test --target native

      # Build all native executables once, up front. `moon cram test` builds
      # every workspace executable before running a doc, and one of them
      # (pdflite's markdown CLI) generates a very large C file that takes the
      # C compiler many minutes — doing it here keeps that one-time cost out
      # of the cram steps (which then run from cache).
      - name: Build (native)
        run: moon build --target native

      # Executable-doc cram tests for each CLI.
      - name: Cram tests (xlsx CLI)
        run: moon cram test cmd/xlsx/cram/

      - name: Cram tests (docx2html CLI)
        run: moon cram test docx2html/tests/cram

      # pdflite's cram doc invokes the CLI and a fixture via env vars (it does
      # not rely on PATH); the Build (native) step above has already produced
      # the binary at the workspace build path.
      - name: Cram tests (pdflite CLI)
        env:
          PDFLITE_CLI: ${{ github.workspace }}/_build/native/debug/build/bobzhang/pdflite/cmd/main/main.exe
          PDFLITE_LOGO_PDF: ${{ github.workspace }}/pdflite/fixtures/camlpdf/logo.pdf
        run: moon cram test pdflite/tests/cram

      # The mbtexcel library and xlsx CLI also target wasm end to end. Build the
      # CLI for wasm and drive it (filesystem read/write via the async runtime).
      - name: Wasm build + CLI smoke test
        run: |
          moon build --target wasm cmd/xlsx
          moon run --target wasm cmd/xlsx -- create ci.xlsx --sheet Data
          moon run --target wasm cmd/xlsx -- set ci.xlsx Data A1 Hello
          got=$(moon run --target wasm cmd/xlsx -- get ci.xlsx Data A1 2>/dev/null)
          echo "get -> $got"; test "$got" = "Hello"
          moon run --target wasm cmd/xlsx -- view ci.xlsx
          v=$(moon run --target wasm cmd/xlsx -- validate ci.xlsx 2>/dev/null)
          echo "validate -> $v"; test "$v" = "valid"
