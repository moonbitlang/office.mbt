name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: check + test + wasm (nightly)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # A handful of parity/fixture tests read the vendored Go excelize
      # checkout (gitignored locally) from `excelize/` and
      # `.repos/excelize/`. Provision it so the full suite can run in CI.
      - name: Fetch excelize test fixtures
        run: |
          git clone --depth 1 https://github.com/qax-os/excelize.git .repos/excelize
          ln -s .repos/excelize excelize

      # The `*_openxml_validity_test.mbt` tests shell out to the Microsoft
      # DocumentFormat.OpenXml SDK validator via scripts/validate_xlsx.sh,
      # which uses the system `dotnet` when it has the net8 runtime. Making
      # .NET 8 available here means `moon test` runs real schema validation
      # of generated workbooks in CI.
      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # The nightly toolchain is required: the project depends on
      # moonbitlang/async >= 0.20 (wasm filesystem support), and the xlsx
      # CLI targets the wasm backend, both of which need nightly.
      - name: Set up MoonBit (nightly)
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash -s nightly
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: MoonBit versions
        run: moon version --all

      # Populate the module registry so dependency resolution (moonbitlang/
      # async, moonbitlang/x, peter-jerry-ye/codex) works on a fresh runner.
      - name: Resolve dependencies
        run: moon update

      - name: Format check
        run: |
          moon fmt
          if ! git diff --quiet; then
            echo "::error::moon fmt changed files; run moon fmt and commit the result."
            git --no-pager diff --stat
            exit 1
          fi

      - name: Type check
        run: moon check

      - name: Test (native, includes OpenXML SDK validation)
        run: moon test --target native

      - name: CLI cram tests
        run: moon cram test cmd/xlsx/cram/

      # The library and the xlsx CLI also target the wasm backend. Verify
      # everything compiles for wasm and that the CLI actually runs there
      # end to end (filesystem read/write via the async runtime).
      - name: Wasm build + CLI smoke test
        run: |
          moon check --target wasm
          moon build --target wasm cmd/xlsx
          moon run --target wasm cmd/xlsx -- create ci.xlsx --sheet Data
          moon run --target wasm cmd/xlsx -- set ci.xlsx Data A1 Hello
          got=$(moon run --target wasm cmd/xlsx -- get ci.xlsx Data A1 2>/dev/null)
          echo "get -> $got"; test "$got" = "Hello"
          moon run --target wasm cmd/xlsx -- view ci.xlsx
          v=$(moon run --target wasm cmd/xlsx -- validate ci.xlsx 2>/dev/null)
          echo "validate -> $v"; test "$v" = "valid"
