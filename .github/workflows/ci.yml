name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: check + test (mbtexcel + docx2html + office + pdflite, nightly)
    runs-on: ubuntu-latest
    # Native tests take ~10 minutes; everything else is small. Fail loudly if
    # something (e.g. an accidental whole-workspace exe build pulling in
    # pdflite's pathological markdown CLI) blows the budget.
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # This repo is a `moon work` workspace with four members: `.`
      # (bobzhang/mbtexcel), `./docx2html` (bobzhang/docx2html), and `./pdflite`
      # (bobzhang/pdflite), plus `./office` (the agent-facing facade). Root
      # `moon check`/`moon test`/`moon fmt` operate on ALL members, so most
      # steps below cover all four modules at once. (pdflite has native C
      # stubs; the ubuntu runner's `cc` compiles them for the native target.)
      #
      # mbtexcel's parity/fixture tests read a small committed subset of the
      # excelize test fixtures from `fixtures/excelize/` (see that directory's
      # README) — no upstream checkout is fetched at test time. (docx2html's own
      # fixtures are likewise committed under docx2html/tests/.)

      # mbtexcel's `*_openxml_validity_test.mbt` tests and docx2html's
      # `sdk_validity_test.mbt` shell out to the Microsoft DocumentFormat.OpenXml
      # SDK validator via scripts/validate_xlsx.sh / validate_docx.sh, which
      # use the system `dotnet` when it has the net8 runtime. Making .NET 8
      # available here means `moon test` runs real schema validation of
      # generated workbooks and docx packages in CI.
      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # The nightly toolchain is required: mbtexcel depends on
      # moonbitlang/async >= 0.20 (wasm filesystem support) and its xlsx CLI
      # targets the wasm backend, both of which need nightly. `moon work sync`
      # has aligned the workspace members on async@0.20.1 + x@0.4.43.
      - name: Set up MoonBit (nightly)
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash -s nightly
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: MoonBit versions
        run: moon version --all

      # Populate the module registry so dependency resolution works on a fresh
      # runner (all deps are first-party: moonbitlang/async and moonbitlang/x).
      - name: Resolve dependencies
        run: moon update

      # Format check across the whole workspace. The 2026-07-10 nightly's
      # moonfmt migrates moon.pkg `options("is-main": true)` to a new
      # `pkgtype(kind: "executable")` form that the same nightly's default
      # parser still REJECTS (the new syntax is behind preview feature
      # flags), so a repo carrying either form cannot satisfy both halves.
      # Until the parser ships by default, restore moon.pkg after fmt and
      # gate formatting on source files only.
      - name: Format check
        run: |
          moon fmt
          git checkout -- ':(glob)**/moon.pkg'
          if ! git diff --quiet; then
            echo "::error::moon fmt changed files; run moon fmt and commit the result."
            git --no-pager diff
            exit 1
          fi

      # Regenerate every member's `pkg.generated.mbti` and fail if the committed
      # interfaces drift from the source (all four members commit their .mbti).
      # Run `moon info` and commit the result to fix.
      - name: Interface check
        run: |
          moon info
          if ! git diff --quiet -- '*pkg.generated.mbti'; then
            echo "::error::pkg.generated.mbti out of date; run moon info and commit."
            git --no-pager diff --stat -- '*pkg.generated.mbti'
            exit 1
          fi

      # Type check all workspace members (native).
      - name: Type check
        run: moon check

      # Type check all workspace members for the wasm backend. mbtexcel's library + xlsx
      # CLI target wasm; docx2html's library packages also build for wasm (its
      # native-only CLI is skipped for this target).
      - name: Type check (wasm)
        run: moon check --target wasm

      # Run all members' native test suites in one pass. Covers mbtexcel
      # (including OpenXML SDK schema validation via .NET), docx2html
      # (converter/reader/fixtures/stress), and pdflite (reader/writer/
      # fixture-acceptance, incl. native C-stub code paths).
      - name: Test (native)
        run: moon test --target native

      # Build only the CLIs the cram docs exercise. Deliberately NOT
      # `moon build --target native` for the whole workspace: pdflite's
      # markdown CLI generates an 87MB C file that takes gcc/clang the better
      # part of an hour (moonc expands the CJK cmapdata constants into code) —
      # a cost no CI run should pay. See the repo quality roadmap.
      - name: Build CLIs (native)
        run: moon build --target native cmd/xlsx docx2html/cmd/docx2html docx2html/cmd/docx office/cmd/office pdflite/cmd/main

      # Run the cram docs from a stub project so `moon cram test` does not
      # trigger a build of every workspace executable (which would include the
      # pathological markdown CLI above — this is also how pdflite's own CI
      # runs its cram). PATH supplies xlsx.exe/docx2html.exe/docx.exe for the
      # docs that invoke them by name; pdflite's doc takes its CLI and fixture
      # via env.
      - name: Cram tests (xlsx, docx2html, office, pdflite CLIs)
        env:
          PDFLITE_CLI: ${{ github.workspace }}/_build/native/debug/build/bobzhang/pdflite/cmd/main/main.exe
          PDFLITE_LOGO_PDF: ${{ github.workspace }}/pdflite/fixtures/camlpdf/logo.pdf
        run: |
          STUB="$RUNNER_TEMP/moon-cram-stub"
          mkdir -p "$STUB"
          printf 'name = "bobzhang/cramstub"\nversion = "0.1.0"\n' > "$STUB/moon.mod"
          export PATH="$GITHUB_WORKSPACE/_build/native/debug/build/bobzhang/mbtexcel/cmd/xlsx:$GITHUB_WORKSPACE/_build/native/debug/build/bobzhang/docx2html/cmd/docx2html:$GITHUB_WORKSPACE/_build/native/debug/build/bobzhang/docx2html/cmd/docx:$GITHUB_WORKSPACE/_build/native/debug/build/bobzhang/office/cmd/office:$PATH"
          cd "$STUB"
          moon cram test "$GITHUB_WORKSPACE/cmd/xlsx/cram"
          moon cram test "$GITHUB_WORKSPACE/docx2html/tests/cram"
          moon cram test "$GITHUB_WORKSPACE/office/cmd/office/cram"
          moon cram test "$GITHUB_WORKSPACE/pdflite/tests/cram"

      # The mbtexcel library and xlsx CLI also target wasm end to end. Build the
      # CLI for wasm and drive it (filesystem read/write via the async runtime).
      - name: Wasm build + CLI smoke test
        run: |
          moon build --target wasm cmd/xlsx
          moon run --target wasm cmd/xlsx -- create ci.xlsx --sheet Data
          moon run --target wasm cmd/xlsx -- set ci.xlsx Data A1 Hello
          got=$(moon run --target wasm cmd/xlsx -- get ci.xlsx Data A1 2>/dev/null)
          echo "get -> $got"; test "$got" = "Hello"
          moon run --target wasm cmd/xlsx -- view ci.xlsx
          # Agent JSON surface: exercise a styled cell and a chart, then
          # validate the payloads structurally (not by substring).
          moon run --target wasm cmd/xlsx -- set ci.xlsx Data B1 42
          moon run --target wasm cmd/xlsx -- style ci.xlsx Data A1 --bold --fill 4472C4
          moon run --target wasm cmd/xlsx -- chart ci.xlsx Data D2 --categories A1:A1 --values B1:B1 --name S
          o=$(moon run --target wasm cmd/xlsx -- outline ci.xlsx 2>/dev/null)
          echo "$o" | jq -e '.schema == "xlsx.outline/1"
            and (.sheets[0].kind == "worksheet")
            and (.sheets[0].charts | length == 1)
            and (.sheets[0].charts[0].kinds == ["barChart"])
            and (.sheets[0].used_range == "A1:B1")'
          j=$(moon run --target wasm cmd/xlsx -- get ci.xlsx Data A1:B2 --json 2>/dev/null)
          echo "$j" | jq -e '.schema == "xlsx.cells/1"
            and (.cells | length == 2)
            and ([.cells[].ref] == ["A1", "B1"])
            and (.styles[.cells[0].style_id | tostring].font.bold == true)
            and (.styles[.cells[0].style_id | tostring].fill.colors == ["4472C4"])'
          cat > ci-batch.json <<'JSON'
          {"schema": "xlsx.batch/1", "ops": [
            {"op": "set", "params": {"sheet": "Data", "cell": "A2", "value": 7.5}},
            {"op": "formula", "params": {"sheet": "Data", "cell": "A3", "formula": "=A2*2"}},
            {"op": "merge", "params": {"sheet": "Data", "cell_range": "C1:D1"}}
          ]}
          JSON
          # The bad param name must fail with the op-indexed error, and the
          # file must be byte-identical afterwards (no write on failure).
          cp ci.xlsx ci-before.xlsx
          out=$(moon run --target wasm cmd/xlsx -- batch ci.xlsx ci-batch.json 2>&1) && { echo "expected the bad script to fail"; exit 1; } || true
          echo "$out" | grep -q "error: op 2 (merge): missing param 'range'"
          cmp ci.xlsx ci-before.xlsx
          sed -i 's/"cell_range"/"range"/' ci-batch.json
          b=$(moon run --target wasm cmd/xlsx -- batch ci.xlsx ci-batch.json 2>/dev/null)
          echo "batch -> $b"; test "$b" = "applied 3 op(s) to ci.xlsx"
          c=$(moon run --target wasm cmd/xlsx -- calc ci.xlsx Data A3 2>/dev/null)
          echo "calc A3 -> $c"; test "$c" = "15"
          v=$(moon run --target wasm cmd/xlsx -- validate ci.xlsx 2>/dev/null)
          echo "validate -> $v"; test "$v" = "valid"
          # The canonical office CLI dispatches by verified package content,
          # not extension alone. Exercise both supported formats under wasm.
          moon build --target wasm office/cmd/office
          f=$(moon run --target wasm office/cmd/office -- identify ci.xlsx 2>office-wasm.err) || { echo "office xlsx identify failed; stderr:"; cat office-wasm.err; exit 1; }
          echo "office identify xlsx -> $f"; test "$f" = "xlsx"
          f=$(moon run --target wasm office/cmd/office -- identify docx2html/tests/cram/fixtures/single-paragraph.docx 2>office-wasm.err) || { echo "office docx identify failed; stderr:"; cat office-wasm.err; exit 1; }
          echo "office identify docx -> $f"; test "$f" = "docx"
          o=$(moon run --target wasm office/cmd/office -- identify ci.xlsx --json 2>office-wasm.err) || { echo "office JSON identify failed; stderr:"; cat office-wasm.err; exit 1; }
          echo "$o" | jq -e '.schema == "office.output/1"
            and .success == true
            and .data.schema == "office.identify/1"
            and .data.format == "xlsx"'
          h=$(moon run --target wasm office/cmd/office -- help all --json 2>office-wasm.err) || { echo "office JSON help failed; stderr:"; cat office-wasm.err; exit 1; }
          echo "$h" | jq -e '.schema == "office.output/1"
            and .success == true
            and .data.schema == "office.capabilities/1"
            and (.data.fingerprint | test("^crc32:[0-9a-f]{8}$"))
            and ([.data.records[].name] == ["docx", "xlsx", "help", "identify"])'
          moon run --target wasm office/cmd/office -- help all --jsonl 2>office-wasm.err \
            | jq -se 'length == 4 and all(.[]; .schema == "office.capability/1")'
          if moon run --target wasm office/cmd/office -- help xlxs --json >office-wasm-error.json 2>office-wasm.err; then
            echo "expected unknown office help format to fail"
            exit 1
          fi
          jq -e '.schema == "office.output/1"
            and .success == false
            and .error.code == "office.unknown_format"
            and .error.details.suggestions == ["xlsx"]' office-wasm-error.json
          # The docx agent CLI also targets wasm end to end: build it and
          # drive its convert subcommand over a committed fixture. Keep the
          # captured stderr and print it on failure — discarding it makes a
          # red run undebuggable.
          moon build --target wasm docx2html/cmd/docx
          d=$(moon run --target wasm docx2html/cmd/docx -- convert docx2html/tests/cram/fixtures/single-paragraph.docx 2>docx-wasm.err) || { echo "docx convert failed; stderr:"; cat docx-wasm.err; exit 1; }
          echo "docx convert -> $d"
          test "$d" = "<p>Walking on imported air</p>" || { echo "unexpected output; stderr:"; cat docx-wasm.err; exit 1; }
          # Agent JSON surface: validate the outline payload structurally.
          o=$(moon run --target wasm docx2html/cmd/docx -- outline docx2html/tests/cram/fixtures/tiny-picture.docx 2>docx-wasm.err) || { echo "docx outline failed; stderr:"; cat docx-wasm.err; exit 1; }
          echo "$o" | jq -e '.schema == "docx.outline/1"
            and (.counts.paragraphs == 1)
            and (.counts.images == 1)
            and (.images[0].content_type == "image/png")'
          g=$(moon run --target wasm docx2html/cmd/docx -- get docx2html/tests/cram/fixtures/tiny-picture.docx '/body/p[1]/r[1]/image[1]' --json 2>docx-wasm.err) || { echo "docx get failed; stderr:"; cat docx-wasm.err; exit 1; }
          echo "$g" | jq -e '.schema == "docx.element/1"
            and (.kind == "image")
            and (.path == "/body/p[1]/r[1]/image[1]")'
          v=$(moon run --target wasm docx2html/cmd/docx -- validate docx2html/tests/cram/fixtures/single-paragraph.docx 2>docx-wasm.err) || { echo "docx validate failed; stderr:"; cat docx-wasm.err; exit 1; }
          echo "docx validate -> $v"; test "$v" = "valid"
          # Write foundation: create a blank document on wasm and gate it
          # with the portable validator.
          moon run --target wasm docx2html/cmd/docx -- create ci-blank.docx 2>docx-wasm.err || { echo "docx create failed; stderr:"; cat docx-wasm.err; exit 1; }
          c=$(moon run --target wasm docx2html/cmd/docx -- validate ci-blank.docx 2>docx-wasm.err) || { echo "blank validate failed; stderr:"; cat docx-wasm.err; exit 1; }
          echo "blank validate -> $c"; test "$c" = "valid"
          # Authoring surface: batch a document from an op script on wasm —
          # docx.batch/2 with a comment (Phase-2 K1), read back through the
          # annotation surface of the same build.
          printf '{"schema": "docx.batch/2", "ops": [{"op": "paragraph", "params": {"runs": [{"text": "Hi"}, {"footnote": {"text": "a wasm footnote"}}], "style": "Heading1"}}, {"op": "comment", "params": {"on": 0, "text": "wasm note", "author": "CI"}}, {"op": "comment", "params": {"reply_to": 1, "done": true, "text": "resolved", "author": "CI2"}}]}' > ci-batch.json
          moon run --target wasm docx2html/cmd/docx -- batch ci-batch.docx ci-batch.json 2>docx-wasm.err || { echo "docx batch failed; stderr:"; cat docx-wasm.err; exit 1; }
          b=$(moon run --target wasm docx2html/cmd/docx -- validate ci-batch.docx 2>docx-wasm.err) || { echo "batch validate failed; stderr:"; cat docx-wasm.err; exit 1; }
          echo "batch validate -> $b"; test "$b" = "valid"
          w=$(moon run --target wasm docx2html/cmd/docx -- outline ci-batch.docx 2>docx-wasm.err | jq -r '.comments[0].author + " " + .comments[1].parent_id + " " + (.comments[1].done | tostring) + " " + (.counts.footnotes | tostring)') || { echo "batch outline failed; stderr:"; cat docx-wasm.err; exit 1; }
          echo "written thread -> $w"; test "$w" = "CI 0 true 1"
          # Annotate an EXISTING document on wasm (Phase-2 L1): byte-span
          # surgery through the same build, read back via its outline.
          moon run --target wasm docx2html/cmd/docx -- annotate add ci-batch.docx ci-annotated.docx --at /body/p[1] --text "wasm annotate" --author L1 2>docx-wasm.err || { echo "annotate failed; stderr:"; cat docx-wasm.err; exit 1; }
          n=$(moon run --target wasm docx2html/cmd/docx -- outline ci-annotated.docx 2>docx-wasm.err | jq -r '.comments | length') || { echo "annotated outline failed; stderr:"; cat docx-wasm.err; exit 1; }
          echo "annotated comments -> $n"; test "$n" = "3"
          # The L2 verbs on wasm: reply to the fresh comment, resolve it.
          moon run --target wasm docx2html/cmd/docx -- annotate reply ci-annotated.docx ci-replied.docx --comment 2 --text "wasm reply" --author L2 2>docx-wasm.err || { echo "reply failed; stderr:"; cat docx-wasm.err; exit 1; }
          moon run --target wasm docx2html/cmd/docx -- annotate resolve ci-replied.docx ci-resolved.docx --comment 2 2>docx-wasm.err || { echo "resolve failed; stderr:"; cat docx-wasm.err; exit 1; }
          t=$(moon run --target wasm docx2html/cmd/docx -- outline ci-resolved.docx 2>docx-wasm.err | jq -r '[.comments[] | select(.id == "2" or .parent_id == "2")] | map(.done) | tostring') || { echo "resolved outline failed; stderr:"; cat docx-wasm.err; exit 1; }
          echo "thread done flags -> $t"; test "$t" = "[true,false]"
          # Annotation read surface on wasm (Phase-2 J2).
          a=$(moon run --target wasm docx2html/cmd/docx -- outline docx2html/tests/cram/fixtures/commented.docx 2>docx-wasm.err | jq -r '.comments[1].parent_id') || { echo "annotated outline failed; stderr:"; cat docx-wasm.err; exit 1; }
          echo "comment parent_id -> $a"; test "$a" = "0"
          # The checked-in authoring acceptance scenario (see
          # docx2html/tests/acceptance/README.md) — same wasm build.
          bash docx2html/tests/acceptance/run.sh
