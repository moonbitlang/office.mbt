name: office-registry-release-check

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  isolated-registry-check:
    name: resolve and test office outside moon.work
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Set up MoonBit (nightly)
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash -s nightly
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: MoonBit versions
        run: moon version --all

      # This script copies office/ and its SDK validation harness into
      # RUNNER_TEMP, beyond the repository's moon.work boundary. It must
      # resolve and assert exact mbtexcel@0.1.9 and docx2html@0.1.45 tree
      # selections, then run frozen package and child SDK-validity gates.
      - name: Verify isolated registry consumer
        env:
          TMPDIR: ${{ runner.temp }}
        run: scripts/check_office_registry_release.sh
