name: docx2html-registry-release-check

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  isolated-registry-check:
    name: resolve and test docx2html outside moon.work
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Set up MoonBit (nightly)
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash -s nightly
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: MoonBit versions
        run: moon version --all

      # This script copies docx2html/ and its SDK validation harness beyond the
      # repository's moon.work boundary. It must resolve mbtexcel@0.1.9 from
      # Mooncakes, assert that exact moon tree selection, and freeze every
      # subsequent build/test/publish-dry-run before docx2html@0.1.45 ships.
      - name: Verify isolated registry dependencies and publish payload
        env:
          TMPDIR: ${{ runner.temp }}
        run: scripts/check_docx2html_registry_release.sh
